<!DOCTYPE html>
<html>
<head>
    <title>AI vs Human Detector</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

    <h1>🤖 AI vs Human Detector</h1>

    <textarea id="text" placeholder="Type your text here..."></textarea>

    <button onclick="predict()">🔍 Analyze</button>

    <div id="result"></div>

</div>

<script>
function predict() {
    let text = document.getElementById("text").value;

    if (text.trim() === "") {
        alert("Please enter some text!");
        return;
    }

    document.getElementById("result").innerHTML = "⏳ Checking...";

    fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: text })
    })
    .then(response => response.json())
    .then(data => {

        let resultBox = document.getElementById("result");

        // ERROR HANDLE
        if (data.error) {
            resultBox.innerHTML = "❌ Error: " + data.error;
            return;
        }

        // OUTPUT DISPLAY
        resultBox.innerHTML = `
            <div class="card">
                <p>📌 Prediction: <b>${data.prediction}</b></p>
                <p>📊 Confidence: <b>${data.confidence}</b></p>
                <p>⚖️ Decision: <b>${data.decision}</b></p>
            </div>
        `;

        // COLOR CHANGE
        if (data.prediction === "Human") {
            resultBox.className = "human";
        } else {
            resultBox.className = "ai";
        }

    })
    .catch(error => {
        document.getElementById("result").innerHTML = "⚠️ Server error";
        console.error(error);
    });
}
</script>

</body>
</html>
